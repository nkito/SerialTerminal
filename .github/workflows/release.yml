name: Build and Release Electron App

on:
  workflow_dispatch:
    inputs:
      draft:
        description: Draft release にする
        type: boolean
        required: false
        default: false
      prerelease:
        description: Pre-release にする
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read version from package.json
        id: pkg
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $version"

      - name: Build Windows installer
        run: npm run dist:win

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
          IS_DRAFT: ${{ inputs.draft }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $tag = "v$env:VERSION"
          $exeFiles = Get-ChildItem -Path release -Filter *.exe | Select-Object -ExpandProperty FullName

          if (-not $exeFiles) {
            Write-Error "release フォルダに .exe が見つかりませんでした。"
            exit 1
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag は既に存在します。asset を上書きアップロードします。"
            gh release upload $tag $exeFiles --clobber
          }
          else {
            $args = @(
              "release", "create", $tag
            )

            $args += $exeFiles
            $args += @("--title", $tag, "--generate-notes")

            if ($env:IS_DRAFT -eq "true") {
              $args += "--draft"
            }

            if ($env:IS_PRERELEASE -eq "true") {
              $args += "--prerelease"
            }

            gh @args
          }